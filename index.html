<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Control Puerta TECNOSIM</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(
        135deg,
        #0f2027 0%,
        #203a43 50%,
        #2c5364 100%
    );
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    padding: 20px;
}

.card {
    width: 100%;
    max-width: 450px;
    background: white;
    border-radius: 30px;
    padding: 40px 30px;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.04);
}

.logo {
    width: 200px;
    max-width: 100%;
    margin-bottom: 15px;
}

h1 {
    color: #203a43;
    font-size: 32px;
    margin-bottom: 8px;
    font-weight: 700;
}

.login-box {
    margin: 22px auto 18px;
    display: grid;
    gap: 10px;
}

.login-box input {
    width: 100%;
    min-height: 44px;
    border: 1px solid #c9d3dc;
    border-radius: 10px;
    padding: 0 12px;
    font-size: 15px;
}

.login-button,
.logout-button {
    min-height: 44px;
    border: none;
    border-radius: 10px;
    color: white;
    font-size: 15px;
    font-weight: 800;
    cursor: pointer;
}

.login-button {
    background: #0b66a3;
}

.logout-button {
    margin: 8px auto 20px;
    padding: 0 18px;
    background: #63717a;
}

.boton-container {
    display: flex;
    justify-content: center;
    align-items: center;
    margin-bottom: 10px;
}

.boton {
    width: 220px;
    height: 220px;
    border: none;
    border-radius: 50%;
    background: linear-gradient(135deg, #ff416c 0%, #ff4b2b 100%);
    color: white;
    font-size: 32px;
    font-weight: bold;
    cursor: pointer;
}

.boton:disabled {
    background: linear-gradient(135deg, #9e9e9e 0%, #757575 100%);
    cursor: not-allowed;
}

.estado-container {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 8px;
    margin-bottom: 20px;
}

.estado-indicador {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: #d62828;
}

.estado-indicador.online {
    background: #1f9d55;
}

#estado {
    font-size: 16px;
    font-weight: 600;
    color: #203a43;
}

.estado.online {
    color: #1f9d55;
}

.estado.offline {
    color: #d62828;
}

#contador {
    margin-top: 20px;
    font-size: 22px;
    font-weight: bold;
    color: #203a43;
    min-height: 30px;
}

.info-box {
    margin: 12px auto 0;
    padding: 14px 16px;
    border-radius: 10px;
    background: #eaf5ff;
    border: 1px solid #cfe9ff;
    color: #0b66a3;
    font-weight: 800;
    max-width: 320px;
    text-align: center;
}

.hidden {
    display: none;
}
</style>
</head>

<body>

<div class="card">
    <img src="logo negro 1.png" class="logo" alt="Logo TECNOSIM">

    <h1>CONTROL PUERTA</h1>

    <div class="estado-container">
        <div class="estado-indicador" id="indicador"></div>
        <p id="estado" class="estado offline">Inicia sesion para usar</p>
    </div>

    <form id="loginForm" class="login-box">
        <input id="emailInput" type="email" placeholder="Correo" autocomplete="email" required>
        <input id="passwordInput" type="password" placeholder="Contrasena" autocomplete="current-password" required>

        <button id="loginBtn" class="login-button" type="submit">Entrar</button>
    </form>

    <button id="logoutBtn" class="logout-button hidden" type="button">Cerrar sesion</button>

    <div id="controlPanel" class="hidden">
        <div class="boton-container">
            <button id="btnPorton" class="boton">ACCIONAR</button>
        </div>

        <div class="info-box">2 SONIDOS = ARMADO</div>
    </div>

    <p id="contador"></p>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
    getAuth,
    onAuthStateChanged,
    signInWithEmailAndPassword,
    signOut
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
    getDatabase,
    ref,
    update,
    serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
    apiKey: "AIzaSyAiLt9YrV_KSktyQVkk6Ot2n4nHP1LqVx0",
    authDomain: "esp1-53532.firebaseapp.com",
    databaseURL: "https://esp1-53532-default-rtdb.firebaseio.com",
    projectId: "esp1-53532",
    storageBucket: "esp1-53532.firebasestorage.app",
    messagingSenderId: "395642028907",
    appId: "1:395642028907:web:98f6567ec952fa39d7422e"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

const btn = document.getElementById("btnPorton");
const contador = document.getElementById("contador");
const estado = document.getElementById("estado");
const indicador = document.getElementById("indicador");

const loginForm = document.getElementById("loginForm");
const emailInput = document.getElementById("emailInput");
const passwordInput = document.getElementById("passwordInput");
const loginBtn = document.getElementById("loginBtn");
const logoutBtn = document.getElementById("logoutBtn");
const controlPanel = document.getElementById("controlPanel");

let currentUser = null;

function setStatus(text, type = "offline") {
    estado.textContent = text;
    estado.className = `estado ${type}`;

    if (type === "online") {
        indicador.className = "estado-indicador online";
    } else {
        indicador.className = "estado-indicador";
    }
}

function setLoggedInUI(user) {
    currentUser = user;

    loginForm.classList.add("hidden");
    logoutBtn.classList.remove("hidden");
    controlPanel.classList.remove("hidden");

    btn.disabled = false;
    setStatus(`Conectado: ${user.email}`, "online");
}

function setLoggedOutUI() {
    currentUser = null;

    loginForm.classList.remove("hidden");
    logoutBtn.classList.add("hidden");
    controlPanel.classList.add("hidden");

    btn.disabled = true;
    contador.textContent = "";
    passwordInput.value = "";

    setStatus("Inicia sesion para usar", "offline");
}

onAuthStateChanged(auth, (user) => {
    if (user) {
        setLoggedInUI(user);
    } else {
        setLoggedOutUI();
    }
});

loginForm.addEventListener("submit", async (event) => {
    event.preventDefault();

    loginBtn.disabled = true;
    setStatus("Verificando usuario...", "offline");

    try {
        await signInWithEmailAndPassword(
            auth,
            emailInput.value.trim(),
            passwordInput.value
        );
    } catch (error) {
        setStatus("Correo o contrasena incorrectos", "offline");
    } finally {
        loginBtn.disabled = false;
    }
});

logoutBtn.addEventListener("click", async () => {
    await signOut(auth);
});

btn.addEventListener("click", async () => {
    if (!currentUser) {
        setStatus("Inicia sesion para usar", "offline");
        return;
    }

    try {
        btn.disabled = true;
        setStatus("Enviando comando...", "offline");

        await update(ref(db, "porton"), {
            accion: 1,
            timestamp: serverTimestamp(),
            lastByUid: currentUser.uid,
            lastByEmail: currentUser.email,
            status: "processing"
        });

        setStatus("Comando enviado", "online");

        for (let i = 7; i > 0; i--) {
            contador.textContent = `Disponible en ${i} segundo${i > 1 ? "s" : ""}`;
            await new Promise(resolve => setTimeout(resolve, 1000));
        }

        contador.textContent = "Listo para usar";
        setStatus(`Conectado: ${currentUser.email}`, "online");

        await new Promise(resolve => setTimeout(resolve, 1500));

        contador.textContent = "";
        btn.disabled = false;

    } catch (error) {
        console.error(error);

        setStatus("Error de autorizacion o envio", "offline");
        contador.textContent = error.message;

        await new Promise(resolve => setTimeout(resolve, 3000));

        contador.textContent = "";
        btn.disabled = false;
    }
});
</script>

</body>
</html>
