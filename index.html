<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Control Portón TECNOSIM</title>

<style>

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(
        135deg,
        #0f2027 0%,
        #203a43 50%,
        #2c5364 100%
    );
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    padding: 20px;
}

.card {
    width: 100%;
    max-width: 450px;
    background: white;
    border-radius: 30px;
    padding: 40px 30px;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
    animation: slideUp 0.6s ease-out;
}

@keyframes slideUp {
    from {
        opacity: 0;
        transform: translateY(30px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.logo {
    width: 200px;
    max-width: 100%;
    margin-bottom: 15px;
}

h1 {
    color: #203a43;
    font-size: 32px;
    margin-bottom: 8px;
    font-weight: 700;
    letter-spacing: 1px;
}

.subtitulo {
    color: #888;
    font-size: 14px;
    margin-bottom: 35px;
    font-weight: 500;
    letter-spacing: 0.5px;
}

/* Contenedor del botón con efecto de pulso */
.boton-container {
    position: relative;
    display: flex;
    justify-content: center;
    align-items: center;
    margin-bottom: 30px;
}

.boton-pulse {
    position: absolute;
    width: 240px;
    height: 240px;
    border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, #ff6b6b, #ff416c);
    opacity: 0;
    animation: pulse 2s infinite;
}

@keyframes pulse {
    0% {
        width: 240px;
        height: 240px;
        opacity: 0.6;
    }
    100% {
        width: 300px;
        height: 300px;
        opacity: 0;
    }
}

.boton {
    width: 220px;
    height: 220px;
    border: none;
    border-radius: 50%;
    background: linear-gradient(135deg, #ff416c 0%, #ff4b2b 100%);
    color: white;
    font-size: 32px;
    font-weight: bold;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    box-shadow: 0 15px 45px rgba(255, 75, 43, 0.4);
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 8px;
}

.boton:hover:not(:disabled) {
    transform: scale(1.08);
    box-shadow: 0 20px 55px rgba(255, 75, 43, 0.6);
}

.boton:active:not(:disabled) {
    transform: scale(0.92);
    box-shadow: 0 8px 20px rgba(255, 75, 43, 0.4);
}

.boton:disabled {
    background: linear-gradient(135deg, #9e9e9e 0%, #757575 100%);
    cursor: not-allowed;
    box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
}

/* Indicador de estado */
.estado-container {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 8px;
    margin-bottom: 20px;
}

.estado-indicador {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    animation: blink 1.5s infinite;
}

.estado-indicador.online {
    background: #1f9d55;
    box-shadow: 0 0 10px rgba(31, 157, 85, 0.6);
}

.estado-indicador.offline {
    background: #d62828;
    box-shadow: 0 0 10px rgba(214, 40, 40, 0.6);
}

@keyframes blink {
    0%, 49%, 100% {
        opacity: 1;
    }
    50%, 99% {
        opacity: 0.5;
    }
}

#estado {
    font-size: 16px;
    font-weight: 600;
    color: #203a43;
}

.estado.online {
    color: #1f9d55;
}

.estado.offline {
    color: #d62828;
}

/* Contador regresivo */
#contador {
    margin-top: 20px;
    font-size: 22px;
    font-weight: bold;
    color: #203a43;
    min-height: 30px;
    animation: fadeIn 0.3s ease;
}

@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(-10px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* Animación de éxito */
.exito {
    animation: successPulse 0.6s ease;
}

@keyframes successPulse {
    0% {
        transform: scale(1);
    }
    50% {
        transform: scale(1.15);
    }
    100% {
        transform: scale(1);
    }
}

.footer {
    margin-top: 25px;
    font-size: 12px;
    color: #aaa;
    letter-spacing: 0.5px;
}

/* Responsive */
@media (max-width: 600px) {
    .card {
        padding: 30px 20px;
        border-radius: 25px;
    }

    h1 {
        font-size: 28px;
    }

    .boton-container {
        margin-bottom: 25px;
    }

    .boton {
        width: 200px;
        height: 200px;
        font-size: 28px;
    }

    .boton-pulse {
        width: 200px;
        height: 200px;
    }

    @keyframes pulse {
        0% {
            width: 200px;
            height: 200px;
            opacity: 0.6;
        }
        100% {
            width: 270px;
            height: 270px;
            opacity: 0;
        }
    }

    #contador {
        font-size: 18px;
    }
}

@media (max-width: 480px) {
    .card {
        padding: 25px 15px;
    }

    h1 {
        font-size: 24px;
    }

    .subtitulo {
        font-size: 12px;
    }

    .boton {
        width: 180px;
        height: 180px;
        font-size: 24px;
        gap: 4px;
    }

    .boton-pulse {
        width: 180px;
        height: 180px;
    }

    @keyframes pulse {
        0% {
            width: 180px;
            height: 180px;
            opacity: 0.6;
        }
        100% {
            width: 250px;
            height: 250px;
            opacity: 0;
        }
    }

    #estado {
        font-size: 14px;
    }

    #contador {
        font-size: 16px;
    }

    .footer {
        font-size: 11px;
    }
}

</style>
</head>

<body>

<div class="card">

    <img src="logo negro 1.png" class="logo" alt="Logo TECNOSIM">

    <h1> CONTROL PORTÓN</h1>

    <p class="subtitulo">2 SONIDOS = ARMADO</p>

    <div class="estado-container">
        <div class="estado-indicador online" id="indicador"></div>
        <p id="estado" class="estado online">Sistema conectado</p>
    </div>

    <div class="boton-container">
        <div class="boton-pulse" id="pulse"></div>
        <button id="btnPorton" class="boton">
            <br>ABRIR
        </button>
    </div>

    <p id="contador"></p>

    <div class="footer">
        TECNOSIM © 2026 | Sistema de Control Remoto
    </div>

</div>

<script type="module">

import { initializeApp }
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
    getDatabase,
    ref,
    set
}
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
    apiKey: "AIzaSyAiLt9YrV_KSktyQVkk6Ot2n4nHP1LqVx0",
    authDomain: "esp1-53532.firebaseapp.com",
    databaseURL: "https://esp1-53532-default-rtdb.firebaseio.com",
    projectId: "esp1-53532",
    storageBucket: "esp1-53532.firebasestorage.app",
    messagingSenderId: "395642028907",
    appId: "1:395642028907:web:98f6567ec952fa39d7422e"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const btn = document.getElementById("btnPorton");
const contador = document.getElementById("contador");
const estado = document.getElementById("estado");
const indicador = document.getElementById("indicador");
const pulse = document.getElementById("pulse");

// Estado de conexión inicial
let isConnected = true;

btn.addEventListener("click", async () => {
    try {
        // Cambiar estado a enviando
        estado.textContent = "Enviando comando...";
        estado.className = "estado";
        indicador.className = "estado-indicador";

        // Enviar comando a Firebase
        await set(
            ref(db, "porton"),
            {
                accion: 1,
                timestamp: new Date().getTime()
            }
        );

        // Éxito - cambiar estado
        estado.textContent = "✅ Comando enviado";
        estado.className = "estado online exito";
        indicador.classList.add("online");
        isConnected = true;

        // Bloquear botón durante 7 segundos
        btn.disabled = true;

        // Iniciar cuenta regresiva
        for (let i = 7; i > 0; i--) {
            contador.innerHTML = `⏳ Disponible en ${i} segundo${i > 1 ? 's' : ''}`;
            await new Promise(r => setTimeout(r, 1000));
        }

        // Finalizar cuenta regresiva
        contador.innerHTML = "✅ Listo para usar";
        estado.textContent = "Sistema conectado";
        estado.className = "estado online";
        indicador.classList.add("online");

        // Limpiar contador después de 2 segundos
        await new Promise(r => setTimeout(r, 2000));
        contador.innerHTML = "";

        // Desbloquear botón
        btn.disabled = false;

    } catch (error) {
        console.error("Error:", error);

        // Error - cambiar estado
        estado.textContent = "❌ Error de conexión";
        estado.className = "estado offline";
        indicador.classList.remove("online");
        indicador.classList.add("offline");
        isConnected = false;

        contador.innerHTML = `Error: ${error.message}`;

        // Permitir reintentar después de 3 segundos
        await new Promise(r => setTimeout(r, 3000));

        estado.textContent = "Reconectando...";
        estado.className = "estado";
        contador.innerHTML = "";
        btn.disabled = false;
    }
});

// Verificar conexión periódicamente (opcional)
setInterval(() => {
    if (btn.disabled === false) {
        // Aquí puedes agregar lógica para verificar conexión
        // Por ahora solo mantenemos el estado actual
    }
}, 5000);

</script>

</body>
</html>
