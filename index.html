<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Portón</title>
</head>
<body>

<h1>CONTROL PORTÓN</h1>

<button onclick="abrirPorton()">
ABRIR PORTÓN
</button>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getDatabase,
ref,
set
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {

apiKey: "TU_API_KEY",

databaseURL:
"https://miporton-default-rtdb.firebaseio.com"

};

const app = initializeApp(firebaseConfig);

const db = getDatabase(app);

window.abrirPorton = function() {

set(ref(db,'porton'),{

accion:1

});

alert("Comando enviado");

}

</script>

</body>
</html>
