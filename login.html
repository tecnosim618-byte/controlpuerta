<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Login - Control Puerta</title>
  <style>
    body { font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Arial; background: linear-gradient(135deg,#0f2027 0%,#203a43 50%,#2c5364 100%); min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px }
    .card{ width:100%; max-width:420px; background:#fff; border-radius:12px; padding:28px; box-shadow:0 10px 30px rgba(2,6,23,0.25); }
    h2{ margin-bottom:12px; color:#203a43 }
    label{ display:block; font-size:13px; margin-top:10px; color:#334 }
    input[type=text], input[type=password] { width:100%; padding:10px 12px; margin-top:6px; border-radius:8px; border:1px solid #d7e3ee; font-size:15px }
    button{ margin-top:16px; width:100%; padding:12px; border-radius:8px; border:none; background:#0b66a3; color:#fff; font-weight:700; cursor:pointer }
    .small{ font-size:13px; color:#666; margin-top:10px }
    .msg{ margin-top:12px; font-weight:600 }
    .link{ margin-top:10px; display:flex; justify-content:center }
    .link a{ color:#0b66a3; text-decoration:none }
  </style>
</head>
<body>
  <div class="card">
    <h2>Acceso al sistema</h2>
    <form id="loginForm">
      <label for="username">Usuario</label>
      <input id="username" name="username" type="text" autocomplete="username" required />

      <label for="password">Contraseña</label>
      <input id="password" name="password" type="password" autocomplete="current-password" required />

      <button type="submit">Entrar</button>
    </form>

    <div class="msg" id="msg"></div>
    <div class="link">
      <a href="index.html">Volver a Control</a>
    </div>

  </div>

<script type="module">
import { db } from './firebase-config.js';
import { ref, get, child, push, set } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js';

const form = document.getElementById('loginForm');
const msg = document.getElementById('msg');

async function sha256Hex(str){
  const enc = new TextEncoder();
  const hash = await crypto.subtle.digest('SHA-256', enc.encode(str));
  return Array.from(new Uint8Array(hash)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

form.addEventListener('submit', async (e)=>{
  e.preventDefault();
  msg.textContent = '';
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  if(!username || !password){ msg.textContent = 'Ingrese usuario y contraseña'; return }

  try{
    const userSnap = await get(child(ref(db), `users/${username}`));
    const timestamp = Date.now();
    let success = false;
    let role = 'usuario';

    if(userSnap.exists()){
      const user = userSnap.val();
      const hash = await sha256Hex(password);
      if(hash === user.passwordHash){
        success = true;
        role = user.role || 'usuario';
      }
    }

    // guardar historial
    await push(ref(db, 'logins'), { username, role, success, timestamp, userAgent: navigator.userAgent });

    if(success){
      msg.style.color = '#0b6622';
      msg.textContent = 'Acceso correcto. Redirigiendo...';
      // guardar sesión simple en sessionStorage
      sessionStorage.setItem('user', JSON.stringify({ username, role }));
      setTimeout(()=>{
        if(role === 'admin') location.href = 'admin.html';
        else location.href = 'index.html';
      },800);
    } else {
      msg.style.color = '#a00';
      msg.textContent = 'Usuario o contraseña incorrectos';
    }

  } catch(err){
    console.error(err);
    msg.style.color = '#a00';
    msg.textContent = 'Error al conectar con la base de datos';
  }
});

</script>
</body>
</html>
